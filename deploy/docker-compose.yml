# Librarian Deployment - Docker Compose
#
# Production deployment for Librarian evidence retrieval engine.
# Single-library architecture: operates on configured library root.
#
# Usage:
#   docker compose up -d
#
# See README.md for detailed setup instructions.

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: librarian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-librarian}
      POSTGRES_USER: ${POSTGRES_USER:-librarian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-librarian}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-librarian} -d ${POSTGRES_DB:-librarian}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - librarian-network

  # Librarian API Server
  librarian-api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: librarian-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-librarian}:${POSTGRES_PASSWORD:-librarian}@postgres:5432/${POSTGRES_DB:-librarian}
      - LIBRARIAN_LIBRARY_ROOT=/library
      - API_PORT=${API_PORT:-8000}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Mount library root - RECURSIVE FILE DISCOVERY IS AUTOMATIC
      # No collection management, no folder picker, no import wizard
      - ${LIBRARY_PATH:-./volumes/library}:/library:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - librarian-network

  # Librarian Worker - Background job processor
  # Phase 3A: Processes jobs from the queue
  librarian-worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: librarian-worker
    restart: unless-stopped
    command: python -m workers.worker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-librarian}:${POSTGRES_PASSWORD:-librarian}@postgres:5432/${POSTGRES_DB:-librarian}
      - LIBRARIAN_LIBRARY_ROOT=/library
      - WORKER_ID=${WORKER_ID:-worker-1}
    volumes:
      # Mount library root for content extraction
      - ${LIBRARY_PATH:-./volumes/library}:/library:ro
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      replicas: ${WORKER_REPLICAS:-1}  # Scale workers with this env var
    networks:
      - librarian-network

  # Librarian GUI (optional - uncomment to enable)
  # librarian-gui:
  #   build:
  #     context: ../gui
  #     dockerfile: Dockerfile
  #   container_name: librarian-gui
  #   restart: unless-stopped
  #   environment:
  #     - API_URL=http://librarian-api:8000
  #   ports:
  #     - "${GUI_PORT:-8080}:8080"
  #   depends_on:
  #     - librarian-api
  #   networks:
  #     - librarian-network

  # Nginx Reverse Proxy (optional - uncomment to enable)
  # nginx:
  #   image: nginx:alpine
  #   container_name: librarian-nginx
  #   restart: unless-stopped
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   depends_on:
  #     - librarian-api
  #     # - librarian-gui
  #   networks:
  #     - librarian-network

networks:
  librarian-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
