# Librarian Deployment - Docker Compose
#
# Production deployment for Librarian evidence retrieval engine.
# Single-library architecture: operates on configured library root.
#
# Usage:
#   docker compose up -d
#
# Network Configuration:
#   - PostgreSQL: Internal-only (postgres:5432) - NOT exposed to host
#   - API: librarian-api:8000 (internal), host:8001
#   - Dashboard: librarian-dashboard:3000 (internal), host:3100
#
# See README.md for detailed setup instructions.

services:
  # PostgreSQL Database
  # Internal-only: accessible via Docker service discovery (postgres:5432)
  # NOT exposed to host - applications connect via Docker network
  postgres:
    image: postgres:16-alpine
    container_name: librarian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-librarian}
      POSTGRES_USER: ${POSTGRES_USER:-librarian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-librarian}
    # No host port exposure - internal Docker network only
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-librarian} -d ${POSTGRES_DB:-librarian}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - librarian-network

  # Librarian API Server
  # Internal: librarian-api:8000
  # Host: localhost:8001
  librarian-api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: librarian-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-librarian}:${POSTGRES_PASSWORD:-librarian}@postgres:5432/${POSTGRES_DB:-librarian}
      - LIBRARIAN_LIBRARY_ROOT=/library
    ports:
      - "${API_HOST_PORT:-8001}:8000"
    volumes:
      # Mount library root - RECURSIVE FILE DISCOVERY IS AUTOMATIC
      # No collection management, no folder picker, no import wizard
      - ${LIBRARY_PATH:-./volumes/library}:/library:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - librarian-network

  # Librarian Worker - Background job processor
  # Internal-only service for processing extraction jobs
  librarian-worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: librarian-worker
    restart: unless-stopped
    command: python -m workers.worker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-librarian}:${POSTGRES_PASSWORD:-librarian}@postgres:5432/${POSTGRES_DB:-librarian}
      - LIBRARIAN_LIBRARY_ROOT=/library
      - WORKER_ID=${WORKER_ID:-worker-1}
    volumes:
      # Mount library root for content extraction
      - ${LIBRARY_PATH:-./volumes/library}:/library:ro
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      replicas: ${WORKER_REPLICAS:-1}  # Scale workers with this env var
    networks:
      - librarian-network

  # Librarian Dashboard - Operational Dashboard
  # Separate React application for system observability
  # Internal: librarian-dashboard:3000
  # Host: localhost:3100
  librarian-dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
      args:
        API_URL: http://librarian-api:8000
        # Build metadata - injected at build time for version traceability
        VITE_BUILD_SHA: ${DASHBOARD_BUILD_SHA:-local}
        VITE_BUILD_TIME: ${DASHBOARD_BUILD_TIME:-}
        VITE_DASHBOARD_VERSION: ${DASHBOARD_VERSION:-dev}
        VITE_API_CONTRACT_VERSION: ${DASHBOARD_API_CONTRACT_VERSION:-v1.0}
        VITE_ENVIRONMENT: ${DASHBOARD_ENVIRONMENT:-production}
    container_name: librarian-dashboard
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://librarian-api:8000
    ports:
      - "${DASHBOARD_HOST_PORT:-3100}:3000"
    depends_on:
      - librarian-api
    networks:
      - librarian-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (optional - uncomment to enable)
  # Useful for production with HTTPS termination
  # nginx:
  #   image: nginx:alpine
  #   container_name: librarian-nginx
  #   restart: unless-stopped
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   depends_on:
  #     - librarian-api
  #     - librarian-dashboard
  #   networks:
  #     - librarian-network

networks:
  librarian-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
