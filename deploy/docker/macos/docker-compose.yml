# Librarian Docker Compose - macOS
#
# Single-library architecture deployment for macOS.
# Mounts host directory as library root with automatic ingestion.

services:
  postgres:
    image: postgres:16
    container_name: librarian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-librarian}
      POSTGRES_USER: ${POSTGRES_USER:-librarian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-librarian}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-librarian} -d ${POSTGRES_DB:-librarian}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - librarian-network

  librarian-api:
    build:
      context: ../../..
      dockerfile: Dockerfile
    container_name: librarian-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-librarian}:${POSTGRES_PASSWORD:-librarian}@host.docker.internal:5432/${POSTGRES_DB:-librarian}
      - LIBRARIAN_LIBRARY_ROOT=/library
      # Plugin dependency and cache paths
      - PLUGIN_DEPENDENCIES_ROOT=/plugin-dependencies
      - PLUGIN_CACHE_ROOT=/plugin-cache
      # Common cache persistence environment variables
      - TORCH_HOME=/plugin-cache/torch
      - HF_HOME=/plugin-cache/huggingface
      - TRANSFORMERS_CACHE=/plugin-cache/transformers
      - PIP_CACHE_DIR=/plugin-cache/pip
    ports:
      - "${API_HOST_PORT:-${API_PORT:-8001}}:8001"
    volumes:
      - ${LIBRARY_PATH:-./volumes/library}:/library:ro
      # Plugin dependencies (models, language packs, etc.) - persistent
      - plugin_dependencies:/plugin-dependencies:rw
      # Plugin cache (pip, wheels, huggingface, torch, etc.) - persistent
      - plugin_cache:/plugin-cache:rw
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - librarian-network

networks:
  librarian-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  # Plugin dependency storage - persists models, language packs, external assets
  plugin_dependencies:
    driver: local
  # Plugin cache storage - persists pip, wheels, huggingface, torch caches
  plugin_cache:
    driver: local
