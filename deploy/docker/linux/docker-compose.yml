# Librarian Docker Compose - Linux
#
# Single-library architecture deployment for Linux.
# Mounts host directory as library root with automatic ingestion.

services:
  postgres:
    image: postgres:16-alpine
    container_name: librarian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-librarian}
      POSTGRES_USER: ${POSTGRES_USER:-librarian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-librarian}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-librarian} -d ${POSTGRES_DB:-librarian}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - librarian-network

  librarian-api:
    build:
      context: ../../..
      dockerfile: Dockerfile
    container_name: librarian-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-librarian}:${POSTGRES_PASSWORD:-librarian}@postgres:5432/${POSTGRES_DB:-librarian}
      - LIBRARIAN_LIBRARY_ROOT=/library
      - LIBRARIAN_DATA_ROOT=/librarian-data
      # Plugin dependency and cache paths
      - PLUGIN_DEPENDENCIES_ROOT=/plugin-dependencies
      - PLUGIN_CACHE_ROOT=/plugin-cache
      # Common cache persistence environment variables
      - TORCH_HOME=/plugin-cache/torch
      - HF_HOME=/plugin-cache/huggingface
      - TRANSFORMERS_CACHE=/plugin-cache/transformers
      - PIP_CACHE_DIR=/plugin-cache/pip
    ports:
      - "${API_HOST_PORT:-${API_PORT:-8001}}:8001"
    volumes:
      - ${LIBRARY_PATH:-./volumes/library}:/library:ro
      # Mount writable volume for derived artifacts (thumbnails, embeddings, etc.)
      - librarian_data:/librarian-data:rw
      # Plugin dependencies (models, language packs, etc.) - persistent
      - plugin_dependencies:/plugin-dependencies:rw
      # Plugin cache (pip, wheels, huggingface, torch, etc.) - persistent
      - plugin_cache:/plugin-cache:rw
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - librarian-network

  librarian-dashboard:
    build:
      context: ../../../dashboard
      dockerfile: Dockerfile
      args:
        API_URL: ""
    container_name: librarian-dashboard
    restart: unless-stopped
    environment:
      - VITE_API_URL=""
    ports:
      - "${DASHBOARD_HOST_PORT:-${DASHBOARD_PORT:-3100}}:3100"
    depends_on:
      - librarian-api
    networks:
      - librarian-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  librarian-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  # Derived artifacts volume - persists thumbnails, embeddings, caches
  librarian_data:
    driver: local
  # Plugin dependency storage - persists models, language packs, external assets
  plugin_dependencies:
    driver: local
  # Plugin cache storage - persists pip, wheels, huggingface, torch caches
  plugin_cache:
    driver: local
