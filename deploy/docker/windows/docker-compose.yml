# Librarian Docker Compose - Windows
#
# Single-library architecture deployment for Windows.
# Mounts host directory as library root with automatic ingestion.

services:
  postgres:
    image: postgres:16-windowsservercore
    container_name: librarian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-librarian}
      POSTGRES_USER: ${POSTGRES_USER:-librarian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-librarian}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:c:/programdata/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-librarian}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - librarian-network

  librarian-api:
    build:
      context: ../../..
      dockerfile: Dockerfile
    container_name: librarian-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-librarian}:${POSTGRES_PASSWORD:-librarian}@host.docker.internal:5432/${POSTGRES_DB:-librarian}
      - LIBRARIAN_LIBRARY_ROOT=C:/library
      # Plugin dependency and cache paths
      - PLUGIN_DEPENDENCIES_ROOT=C:/plugin-dependencies
      - PLUGIN_CACHE_ROOT=C:/plugin-cache
      # Common cache persistence environment variables
      - TORCH_HOME=C:/plugin-cache/torch
      - HF_HOME=C:/plugin-cache/huggingface
      - TRANSFORMERS_CACHE=C:/plugin-cache/transformers
      - PIP_CACHE_DIR=C:/plugin-cache/pip
    ports:
      - "${API_HOST_PORT:-${API_PORT:-8001}}:8001"
    volumes:
      - ${LIBRARY_PATH:-C:/Users/${USERNAME}/Documents}:C:/library:ro
      # Plugin dependencies (models, language packs, etc.) - persistent
      - plugin_dependencies:c:/plugin-dependencies:rw
      # Plugin cache (pip, wheels, huggingface, torch, etc.) - persistent
      - plugin_cache:c:/plugin-cache:rw
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - librarian-network

networks:
  librarian-network:
    driver: nat

volumes:
  postgres_data:
    driver: local
  # Plugin dependency storage - persists models, language packs, external assets
  plugin_dependencies:
    driver: local
  # Plugin cache storage - persists pip, wheels, huggingface, torch caches
  plugin_cache:
    driver: local
