# Nginx Configuration for Librarian
#
# Placeholder configuration for reverse proxy.
# Uncomment services in docker-compose.yml to enable.

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Upstream definitions
    upstream api {
        server librarian-api:8000;
    }

    # upstream gui {
    #     server librarian-gui:8080;
    # }

    server {
        listen 80;
        server_name localhost;

        # API documentation
        location /docs {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # GUI (uncomment when GUI is enabled)
        # location / {
        #     proxy_pass http://gui;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        # }

        # Health check endpoint
        location /health {
            proxy_pass http://api;
            access_log off;
        }
    }
}
