name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  import-validation:
    name: Import Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install fastapi starlette pydantic
      
      - name: Run import validation tests
        run: |
          python tests/test_imports.py
      
      - name: Check syntax
        run: |
          python -m py_compile api/app.py
          python -m py_compile api/routes/questions.py
          python -m py_compile api/routes/collections.py
          python -m py_compile api/routes/operations.py
          python -m py_compile api/routes/pipeline.py

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run unit tests
        run: |
          pytest tests/ -v --ignore=tests/test_pipeline_integration.py -x

  startup-validation:
    name: Startup Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: librarian
          POSTGRES_USER: librarian
          POSTGRES_PASSWORD: librarian
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Test application import
        run: |
          DATABASE_URL=postgresql://librarian:librarian@localhost:5432/librarian \
          python -c "from api.app import app; print('Application imported successfully')"
      
      - name: Test uvicorn startup
        run: |
          timeout 10 bash -c '
            DATABASE_URL=postgresql://librarian:librarian@localhost:5432/librarian \
            uvicorn api.app:app --host 127.0.0.1 --port 8001 &
            PID=$!
            sleep 5
            curl -sf http://127.0.0.1:8001/health
            kill $PID 2>/dev/null
          ' || { echo "Startup test failed"; exit 1; }
      
      - name: Verify health endpoint
        run: |
          DATABASE_URL=postgresql://librarian:librarian@localhost:5432/librarian \
          uvicorn api.app:app --host 127.0.0.1 --port 8001 &
          PID=$!
          sleep 5
          RESPONSE=$(curl -sf http://127.0.0.1:8001/health)
          kill $PID 2>/dev/null
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | grep -q "healthy" && echo "Health check passed" || { echo "Health check failed"; exit 1; }