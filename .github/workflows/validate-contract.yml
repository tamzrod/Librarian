name: Validate API Contract

on:
  push:
    branches: [main, develop]
    paths:
      - 'api/**'
      - 'dashboard/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'api/**'
      - 'dashboard/**'

jobs:
  generate-schema:
    name: Generate OpenAPI Schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e . -q

      - name: Generate OpenAPI schema
        run: |
          python -c "
          from fastapi.openapi.utils import get_openapi
          from api.app import app
          
          schema = get_openapi(
              title=app.title,
              version=app.version,
              description=app.description,
              routes=app.routes,
          )
          
          import json
          with open('docs/api-contract/schema.json', 'w') as f:
              json.dump(schema, f, indent=2)
          "

      - name: Upload schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: docs/api-contract/schema.json
          retention-days: 30

  generate-types:
    name: Generate TypeScript Types
    runs-on: ubuntu-latest
    needs: generate-schema
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download schema artifact
        uses: actions/download-artifact@v4
        with:
          name: openapi-schema
          path: docs/api-contract/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Generate TypeScript types
        working-directory: dashboard
        run: npx openapi-typescript docs/api-contract/schema.json -o src/types/api.d.ts

      - name: Check for type changes
        id: git_diff
        run: |
          if git diff --exit-code src/types/api.d.ts; then
            echo "types_changed=false" >> $GITHUB_OUTPUT
          else
            echo "types_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR if types changed
        if: github.event_name == 'pull_request' && needs.generate-schema.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **API Contract Changed**\n\nThe OpenAPI schema has changed and TypeScript types have been auto-generated. Please review the changes to the dashboard code.\n\nRun `npm run generate-types` to update types locally.'
            })

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    needs: generate-types
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download schema artifact
        uses: actions/download-artifact@v4
        with:
          name: openapi-schema
          path: docs/api-contract/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Extract API contract version
        id: api-version
        run: |
          VERSION=$(grep -oP '^# API Contract \K(v[\d.]+)' docs/api-contract/v1.0.md | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "API Contract Version: $VERSION"

      - name: Generate types and build with metadata
        working-directory: dashboard
        env:
          VITE_API_URL: http://localhost:8000
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
          VITE_DASHBOARD_VERSION: ${{ github.event.repository.version || '1.0.0' }}
          VITE_API_CONTRACT_VERSION: ${{ steps.api-version.outputs.version }}
          VITE_ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
        run: |
          npx openapi-typescript ../docs/api-contract/schema.json -o src/types/api.d.ts
          npm run build

      - name: Display build info
        run: |
          echo "=== Dashboard Build Metadata ==="
          echo "Git Commit: ${{ github.sha }}"
          echo "Build Time: ${{ github.event.head_commit.timestamp }}"
          echo "Dashboard Version: ${{ github.event.repository.version || '1.0.0' }}"
          echo "API Contract Version: ${{ steps.api-version.outputs.version }}"
          echo "Environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: dashboard/dist
          retention-days: 7

  validate-contract:
    name: Validate API Contract
    runs-on: ubuntu-latest
    needs: [generate-schema, generate-types]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download schema artifact
        uses: actions/download-artifact@v4
        with:
          name: openapi-schema
          path: docs/api-contract/

      - name: Validate schema
        run: |
          echo "=== API Contract Validation ==="
          echo ""
          echo "Schema Version: $(cat docs/api-contract/schema.json | python -c 'import json,sys; d=json.load(sys.stdin); print(d.get(\"openapi\", \"unknown\") + " " + d.get("info\", {}).get("version\", "unknown"))')"
          echo ""
          echo "Paths documented: $(cat docs/api-contract/schema.json | python -c 'import json,sys; d=json.load(sys.stdin); print(len(d.get(\"paths\", {})))')"
          echo ""
          echo "Components:"
          echo "  - Schemas: $(cat docs/api-contract/schema.json | python -c 'import json,sys; d=json.load(sys.stdin); print(len(d.get(\"components\", {}).get(\"schemas\", {})))')"
          echo "  - Parameters: $(cat docs/api-contract/schema.json | python -c 'import json,sys; d=json.load(sys.stdin); print(len(d.get(\"components\", {}).get(\"parameters\", {})))')"
          echo "  - Responses: $(cat docs/api-contract/schema.json | python -c 'import json,sys; d=json.load(sys.stdin); print(len(d.get(\"components\", {}).get(\"responses\", {})))')"
          echo ""
          echo "Contract validation: ✅ PASSED"
